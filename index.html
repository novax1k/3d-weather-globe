<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 即時天氣地球儀</title>
    <!-- 引入 Tailwind CSS 進行快速 UI 樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js 與 Globe.gl -->
    <script src="https://unpkg.com/three/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #globe-container { width: 100vw; height: 100vh; cursor: grab; }
        #globe-container:active { cursor: grabbing; }
        
        /* 玻璃擬態 (Glassmorphism) 樣式設計 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* 載入動畫 */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 自訂捲軸樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="text-white relative">

    <!-- 標題區域 -->
    <div class="absolute top-6 left-6 z-10 glass-panel px-6 py-4 rounded-2xl pointer-events-none">
        <h1 class="text-2xl font-bold tracking-wider mb-1 flex items-center gap-2">
            <i data-lucide="globe-2"></i> 世界即時天氣
        </h1>
        <p class="text-sm text-gray-300">拖曳以旋轉地球，點擊城市查看即時天氣</p>
    </div>

    <!-- 定位按鈕 (新增) -->
    <button id="locate-btn" class="absolute bottom-8 right-8 z-10 glass-panel px-4 py-3 rounded-full flex items-center gap-2 hover:bg-white/20 transition-all text-white font-medium shadow-lg hover:scale-105">
        <i data-lucide="navigation"></i> <span class="hidden sm:inline">我的位置</span>
    </button>

    <!-- 地球容器 -->
    <div id="globe-container"></div>

    <!-- 天氣資訊彈出面板 -->
    <div id="weather-panel" class="absolute top-1/2 right-8 transform -translate-y-1/2 z-20 glass-panel w-80 rounded-2xl p-6 hidden transition-opacity duration-300">
        <button id="close-btn" class="absolute top-4 right-4 text-gray-300 hover:text-white transition-colors">
            <i data-lucide="x"></i>
        </button>
        
        <div id="weather-content" class="max-h-[70vh] overflow-y-auto overflow-x-hidden p-1 custom-scrollbar">
            <!-- 動態插入內容 -->
        </div>
    </div>

    <script>
        const apiKey = ""; // 供環境自動注入 API Key

        lucide.createIcons();

        // 城市資料庫：擴充全球各大洲重要城市，並加入英文名稱
        const cities = [
            // 台灣與東亞
            { name: "台北", nameEn: "Taipei", lat: 25.0330, lng: 121.5654, country: "台灣", countryEn: "Taiwan" },
            { name: "新竹", nameEn: "Hsinchu", lat: 24.8138, lng: 120.9675, country: "台灣", countryEn: "Taiwan" },
            { name: "苗栗", nameEn: "Miaoli", lat: 24.5648, lng: 120.8206, country: "台灣", countryEn: "Taiwan" },
            { name: "台中", nameEn: "Taichung", lat: 24.1477, lng: 120.6736, country: "台灣", countryEn: "Taiwan" },
            { name: "東京", nameEn: "Tokyo", lat: 35.6762, lng: 139.6503, country: "日本", countryEn: "Japan" },
            { name: "首爾", nameEn: "Seoul", lat: 37.5665, lng: 126.9780, country: "韓國", countryEn: "South Korea" },
            
            // 中國
            { name: "北京", nameEn: "Beijing", lat: 39.9042, lng: 116.4074, country: "中國", countryEn: "China" },
            { name: "上海", nameEn: "Shanghai", lat: 31.2304, lng: 121.4737, country: "中國", countryEn: "China" },
            { name: "廣州", nameEn: "Guangzhou", lat: 23.1291, lng: 113.2644, country: "中國", countryEn: "China" },
            { name: "烏魯木齊", nameEn: "Urumqi", lat: 43.8256, lng: 87.6168, country: "中國", countryEn: "China" }, // 填補中亞交界
            
            // 北亞與俄羅斯
            { name: "莫斯科", nameEn: "Moscow", lat: 55.7558, lng: 37.6173, country: "俄羅斯", countryEn: "Russia" },
            { name: "聖彼得堡", nameEn: "St. Petersburg", lat: 59.9343, lng: 30.3351, country: "俄羅斯", countryEn: "Russia" },
            { name: "新西伯利亞", nameEn: "Novosibirsk", lat: 55.0084, lng: 82.9357, country: "俄羅斯", countryEn: "Russia" }, // 填補西伯利亞
            { name: "海參崴", nameEn: "Vladivostok", lat: 43.1198, lng: 131.8869, country: "俄羅斯", countryEn: "Russia" }, // 填補遠東
            
            // 中亞、西亞與南亞
            { name: "塔什干", nameEn: "Tashkent", lat: 41.2995, lng: 69.2401, country: "烏茲別克", countryEn: "Uzbekistan" }, // 填補中亞
            { name: "新德里", nameEn: "New Delhi", lat: 28.6139, lng: 77.2090, country: "印度", countryEn: "India" },
            { name: "孟買", nameEn: "Mumbai", lat: 19.0760, lng: 72.8777, country: "印度", countryEn: "India" },
            { name: "德黑蘭", nameEn: "Tehran", lat: 35.6892, lng: 51.3890, country: "伊朗", countryEn: "Iran" },
            { name: "利雅德", nameEn: "Riyadh", lat: 24.7136, lng: 46.6753, country: "沙烏地阿拉伯", countryEn: "Saudi Arabia" },
            { name: "杜拜", nameEn: "Dubai", lat: 25.2048, lng: 55.2708, country: "阿聯酋", countryEn: "UAE" },
            { name: "伊斯坦堡", nameEn: "Istanbul", lat: 41.0082, lng: 28.9784, country: "土耳其", countryEn: "Turkey" },
            
            // 東南亞
            { name: "新加坡", nameEn: "Singapore", lat: 1.3521, lng: 103.8198, country: "新加坡", countryEn: "Singapore" },
            { name: "曼谷", nameEn: "Bangkok", lat: 13.7563, lng: 100.5018, country: "泰國", countryEn: "Thailand" },
            { name: "雅加達", nameEn: "Jakarta", lat: -6.2088, lng: 106.8456, country: "印尼", countryEn: "Indonesia" },
            
            // 歐洲
            { name: "倫敦", nameEn: "London", lat: 51.5074, lng: -0.1278, country: "英國", countryEn: "UK" },
            { name: "巴黎", nameEn: "Paris", lat: 48.8566, lng: 2.3522, country: "法國", countryEn: "France" },
            { name: "柏林", nameEn: "Berlin", lat: 52.5200, lng: 13.4050, country: "德國", countryEn: "Germany" },
            { name: "羅馬", nameEn: "Rome", lat: 41.9028, lng: 12.4964, country: "義大利", countryEn: "Italy" },
            { name: "馬德里", nameEn: "Madrid", lat: 40.4168, lng: -3.7038, country: "西班牙", countryEn: "Spain" },
            { name: "基輔", nameEn: "Kyiv", lat: 50.4501, lng: 30.5234, country: "烏克蘭", countryEn: "Ukraine" }, // 填補東歐
            { name: "雷克雅維克", nameEn: "Reykjavik", lat: 64.1466, lng: -21.9426, country: "冰島", countryEn: "Iceland" },
            
            // 北美洲
            { name: "紐約", nameEn: "New York", lat: 40.7128, lng: -74.0060, country: "美國", countryEn: "USA" },
            { name: "洛杉磯", nameEn: "Los Angeles", lat: 34.0522, lng: -118.2437, country: "美國", countryEn: "USA" },
            { name: "多倫多", nameEn: "Toronto", lat: 43.6510, lng: -79.3470, country: "加拿大", countryEn: "Canada" },
            { name: "墨西哥城", nameEn: "Mexico City", lat: 19.4326, lng: -99.1332, country: "墨西哥", countryEn: "Mexico" }, // 填補中美洲
            
            // 南美洲
            { name: "聖保羅", nameEn: "São Paulo", lat: -23.5505, lng: -46.6333, country: "巴西", countryEn: "Brazil" },
            { name: "里約熱內盧", nameEn: "Rio de Janeiro", lat: -22.9068, lng: -43.1729, country: "巴西", countryEn: "Brazil" },
            { name: "瑪瑙斯", nameEn: "Manaus", lat: -3.1190, lng: -60.0217, country: "巴西", countryEn: "Brazil" }, // 填補亞馬遜雨林區
            { name: "布宜諾斯艾利斯", nameEn: "Buenos Aires", lat: -34.6037, lng: -58.3816, country: "阿根廷", countryEn: "Argentina" },
            { name: "聖地牙哥", nameEn: "Santiago", lat: -33.4489, lng: -70.6693, country: "智利", countryEn: "Chile" }, // 填補安地斯山脈西側
            { name: "波哥大", nameEn: "Bogotá", lat: 4.7110, lng: -74.0721, country: "哥倫比亞", countryEn: "Colombia" }, // 填補南美北部
            
            // 非洲
            { name: "開羅", nameEn: "Cairo", lat: 30.0444, lng: 31.2357, country: "埃及", countryEn: "Egypt" },
            { name: "卡薩布蘭卡", nameEn: "Casablanca", lat: 33.5731, lng: -7.5898, country: "摩洛哥", countryEn: "Morocco" }, // 填補西北非
            { name: "拉哥斯", nameEn: "Lagos", lat: 6.5244, lng: 3.3792, country: "奈及利亞", countryEn: "Nigeria" }, // 填補西非
            { name: "金夏沙", nameEn: "Kinshasa", lat: -4.4419, lng: 15.2663, country: "剛果民主共和國", countryEn: "DRC" }, // 填補中非
            { name: "阿迪斯阿貝巴", nameEn: "Addis Ababa", lat: 9.0320, lng: 38.7482, country: "衣索比亞", countryEn: "Ethiopia" }, // 填補東非
            { name: "奈洛比", nameEn: "Nairobi", lat: -1.2921, lng: 36.8219, country: "肯亞", countryEn: "Kenya" },
            { name: "約翰尼斯堡", nameEn: "Johannesburg", lat: -26.2041, lng: 28.0473, country: "南非", countryEn: "South Africa" },
            { name: "開普敦", nameEn: "Cape Town", lat: -33.9249, lng: 18.4241, country: "南非", countryEn: "South Africa" },
            
            // 大洋洲
            { name: "雪梨", nameEn: "Sydney", lat: -33.8688, lng: 151.2093, country: "澳洲", countryEn: "Australia" },
            { name: "奧克蘭", nameEn: "Auckland", lat: -36.8485, lng: 174.7633, country: "紐西蘭", countryEn: "New Zealand" }
        ];

        // 建立 3D 地球實例
        const globeContainer = document.getElementById('globe-container');
        const world = Globe()(globeContainer)
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            
            // 使用 HTML 元素取代 WebGL 文字，徹底解決字型崩潰與中文亂碼問題
            .htmlElementsData(cities)
            .htmlLat(d => d.lat)
            .htmlLng(d => d.lng)
            .htmlAltitude(0.01)
            .htmlElement(d => {
                const el = document.createElement('div');
                
                // 判斷是否為使用者的「目前位置」，藉此套用不同的醒目顏色與動畫
                const isMyLocation = d.name === "目前位置";
                const dotSize = isMyLocation ? "w-3 h-3 animate-pulse" : "w-2.5 h-2.5";
                const dotColor = isMyLocation ? "bg-cyan-400" : "bg-orange-400";
                const shadowColor = isMyLocation ? "shadow-[0_0_12px_2px_#22d3ee]" : "shadow-[0_0_12px_2px_#ffa500]";
                const textColor = isMyLocation ? "text-cyan-400" : "text-orange-400";
                const subTextColor = isMyLocation ? "text-cyan-200" : "text-orange-200/80";

                // DOM 元素的 UI 設計，加入英文名稱顯示與動態樣式
                el.innerHTML = `
                    <div class="city-marker-content flex flex-col items-center absolute cursor-pointer hover:scale-110 transition-transform duration-200" 
                         style="left: 0; top: 0; transform: translate(-50%, -50%) scale(1); pointer-events: auto;">
                        <div class="${dotSize} ${dotColor} rounded-full ${shadowColor} mb-1"></div>
                        <div class="${textColor} font-bold text-sm whitespace-nowrap bg-black bg-opacity-40 px-1.5 py-0.5 rounded shadow-lg backdrop-blur-sm text-center" 
                             style="font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;">
                            ${d.name} <span class="text-[10px] ${subTextColor} font-normal ml-1">${d.nameEn}</span>
                        </div>
                    </div>
                `;
                // 綁定點擊事件
                el.querySelector('.city-marker-content').onclick = (e) => {
                    e.stopPropagation(); // 避免點擊時觸發地球拖曳
                    handleCityClick(d);
                };
                return el;
            });

        // 設定初始視角與全手動控制
        world.pointOfView({ lat: 23.5, lng: 121, altitude: 2.5 }); 
        world.controls().autoRotate = false; 
        world.controls().enableDamping = true; 

        // 監聽滑鼠縮放與視角變動事件，動態調整 HTML 標籤大小
        world.controls().addEventListener('change', () => {
            const currentAlt = world.pointOfView().altitude;
            // 重新計算動態縮放比例：設定嚴格的上下限
            // Math.max(0.8, ...) 確保放大地球時，標籤縮小極限維持在 80% 大小，不會看不見
            // Math.min(1.2, ...) 確保縮小地球時，標籤放大極限不會超過 120%，避免滿畫面都是字
            const dynamicScale = Math.max(0.8, Math.min(1.2, currentAlt * 0.4));
            
            // 透過 CSS Transform 即時更新尺寸
            document.querySelectorAll('.city-marker-content').forEach(el => {
                el.style.transform = `translate(-50%, -50%) scale(${dynamicScale})`;
            });
        });

        // 視窗縮放自動調整
        window.addEventListener('resize', () => {
            world.width(window.innerWidth);
            world.height(window.innerHeight);
        });

        // 解析天氣代碼
        function getWeatherDetails(code) {
            if (code === 0) return { text: "晴天", icon: "sun", color: "text-yellow-400" };
            if (code === 1 || code === 2 || code === 3) return { text: "多雲 / 陰天", icon: "cloud", color: "text-gray-300" };
            if (code === 45 || code === 48) return { text: "有霧", icon: "cloud-fog", color: "text-gray-400" };
            if (code >= 51 && code <= 55) return { text: "毛毛雨", icon: "cloud-drizzle", color: "text-blue-300" };
            if (code >= 61 && code <= 65) return { text: "下雨", icon: "cloud-rain", color: "text-blue-400" };
            if (code >= 71 && code <= 75) return { text: "下雪", icon: "snowflake", color: "text-white" };
            if (code >= 95 && code <= 99) return { text: "雷陣雨", icon: "cloud-lightning", color: "text-yellow-500" };
            return { text: "未知天氣", icon: "help-circle", color: "text-gray-400" };
        }

        const weatherPanel = document.getElementById('weather-panel');
        const weatherContent = document.getElementById('weather-content');
        const closeBtn = document.getElementById('close-btn');

        // 改為優先從瀏覽器的 localStorage 讀取金鑰
        let userApiKey = localStorage.getItem('gemini_api_key') || ""; 

        // API 重試機制 (強化錯誤處理，抓取真實錯誤訊息)
        async function fetchWithRetry(url, options, retries = 5) {
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        // 解析 Google API 回傳的真實錯誤細節
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(errData.error?.message || `HTTP 錯誤碼: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        // 呼叫 Gemini 共用函數 (加入安全輸入機制與本地儲存)
        async function callGeminiAPI(promptText) {
            // 檢查是否已有 API Key，若無則跳出視窗要求輸入
            if (!userApiKey) {
                userApiKey = prompt("請輸入您的 Gemini API Key 以啟用 AI 智能導遊：\n（為保護資安，此金鑰僅會保存在您目前瀏覽器的本地儲存空間，不會上傳外洩）");
                if (!userApiKey) {
                    throw new Error("未輸入 API Key，取消操作。");
                }
                // 將使用者輸入的金鑰存入 localStorage，下次重新整理就不必再輸入
                localStorage.setItem('gemini_api_key', userApiKey);
            }

            // 【重要修改】根據 2026 最新官方文件，全面升級為 Gemini 3 系列模型
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${userApiKey}`;
            const options = {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            };

            const result = await fetchWithRetry(url, options);
            return result.candidates?.[0]?.content?.parts?.[0]?.text || "無法獲取建議，請確認 API 回傳格式。";
        }

        closeBtn.addEventListener('click', () => {
            weatherPanel.classList.add('hidden');
        });

        // 點擊城市
        async function handleCityClick(city) {
            world.pointOfView({ lat: city.lat, lng: city.lng, altitude: 1.5 }, 1000);

            weatherPanel.classList.remove('hidden');
            weatherContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-32 gap-3">
                    <div class="spinner"></div>
                    <p class="text-sm text-gray-300">正在獲取 ${city.name} 的天氣資料...</p>
                </div>
            `;

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lng}&current_weather=true&timezone=auto`);
                const data = await response.json();
                
                if (data.current_weather) {
                    const temp = data.current_weather.temperature;
                    const windSpeed = data.current_weather.windspeed;
                    const code = data.current_weather.weathercode;
                    const weatherInfo = getWeatherDetails(code);

                    weatherContent.innerHTML = `
                        <div class="text-center">
                            <h2 class="text-3xl font-bold mb-1 tracking-wider">${city.name} <span class="text-xl font-normal text-gray-300">${city.nameEn}</span></h2>
                            <p class="text-sm text-gray-400 mb-6">${city.country} / ${city.countryEn}</p>
                            
                            <div class="flex flex-col items-center justify-center mb-6">
                                <i data-lucide="${weatherInfo.icon}" class="w-16 h-16 ${weatherInfo.color} mb-3"></i>
                                <span class="text-xl font-medium">${weatherInfo.text}</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4 text-left bg-black bg-opacity-30 rounded-xl p-4 mb-5">
                                <div>
                                    <p class="text-xs text-gray-400 mb-1 flex items-center gap-1"><i data-lucide="thermometer" class="w-3 h-3"></i> 溫度</p>
                                    <p class="text-2xl font-bold">${temp}°C</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400 mb-1 flex items-center gap-1"><i data-lucide="wind" class="w-3 h-3"></i> 風速</p>
                                    <p class="text-2xl font-bold">${windSpeed} <span class="text-sm font-normal">km/h</span></p>
                                </div>
                            </div>

                            <!-- 升級版 AI 智能導遊功能區塊 -->
                            <div class="mt-2 pt-4 border-t border-gray-600/50">
                                <p class="text-xs text-gray-400 mb-3 text-left flex items-center gap-1">
                                    <i data-lucide="bot" class="w-4 h-4"></i> AI 智能導遊
                                </p>
                                <div class="flex flex-col gap-2.5">
                                    <button id="ai-btn-outfit" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white text-sm font-medium py-2 px-3 rounded-lg transition-all flex items-center justify-center gap-2">
                                        👕 穿搭與活動建議
                                    </button>
                                    <button id="ai-btn-food" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white text-sm font-medium py-2 px-3 rounded-lg transition-all flex items-center justify-center gap-2">
                                        🍜 必吃在地美食
                                    </button>
                                    <button id="ai-btn-trip" class="w-full bg-gradient-to-r from-purple-500/80 to-indigo-600/80 hover:from-purple-500 hover:to-indigo-600 text-white text-sm font-medium py-2 px-3 rounded-lg transition-all shadow-lg flex items-center justify-center gap-2">
                                        ✨ 天氣專屬半日遊
                                    </button>
                                </div>
                                <div id="ai-result" class="mt-4 text-sm text-left text-gray-200 hidden bg-black/40 p-4 rounded-xl border border-purple-500/30 leading-relaxed shadow-inner max-h-48 overflow-y-auto custom-scrollbar"></div>
                            </div>
                        </div>
                    `;
                    lucide.createIcons();

                    // 綁定三個 AI 按鈕事件
                    const resultDiv = document.getElementById('ai-result');
                    const aiBtnOutfit = document.getElementById('ai-btn-outfit');
                    const aiBtnFood = document.getElementById('ai-btn-food');
                    const aiBtnTrip = document.getElementById('ai-btn-trip');
                    const allBtns = [aiBtnOutfit, aiBtnFood, aiBtnTrip];

                    const handleAIAction = async (btn, promptText, prefix) => {
                        allBtns.forEach(b => b.disabled = true);
                        const originalHtml = btn.innerHTML;
                        btn.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div> 思考中...`;
                        resultDiv.classList.add('hidden');

                        try {
                            const suggestion = await callGeminiAPI(promptText);
                            // 移除 Markdown 的粗體符號 (**)，但保留原本的條列式星號 (*)
                            const cleanSuggestion = suggestion.replace(/\*\*/g, '');
                            // 關鍵修改：加入 whitespace-pre-wrap 讓 HTML 認識換行，並加大字距讓閱讀更舒適
                            resultDiv.innerHTML = `
                                <strong class="text-purple-300 text-base">${prefix}</strong>
                                <div class="mt-3 text-gray-200 whitespace-pre-wrap leading-relaxed tracking-wide">${cleanSuggestion}</div>
                            `;
                            resultDiv.classList.remove('hidden');
                        } catch (error) {
                            // 將真實錯誤訊息顯示在畫面上，方便除錯
                            console.error("Gemini API 發生錯誤:", error);
                            resultDiv.innerHTML = `
                                <span class="text-red-400 font-bold">⚠️ 發生錯誤：</span><br/>
                                <span class="text-red-300 text-xs mt-1 block break-words">${error.message}</span>
                                <button onclick="localStorage.removeItem('gemini_api_key'); userApiKey=''; alert('金鑰已清除，請重新點擊按鈕輸入');" class="mt-2 text-xs text-gray-400 underline hover:text-white">點此清除重設 API Key</button>
                            `;
                            resultDiv.classList.remove('hidden');
                        } finally {
                            allBtns.forEach(b => b.disabled = false);
                            btn.innerHTML = originalHtml;
                        }
                    };

                    if (aiBtnOutfit) {
                        aiBtnOutfit.addEventListener('click', () => {
                            const prompt = `現在 ${city.country}(${city.countryEn}) 的 ${city.name}(${city.nameEn}) 天氣是 ${weatherInfo.text}，氣溫 ${temp}°C。請用繁體中文給出一段簡短生動的旅行穿搭建議與適合的活動（限50字以內，請分段落說明）。`;
                            handleAIAction(aiBtnOutfit, prompt, "👕 穿搭與活動：");
                        });
                    }
                    if (aiBtnFood) {
                        aiBtnFood.addEventListener('click', () => {
                            const prompt = `我現在在 ${city.country}(${city.countryEn}) 的 ${city.name}(${city.nameEn})，天氣是 ${weatherInfo.text}，氣溫 ${temp}°C。請用繁體中文推薦 3 道最適合現在天氣品嚐的當地特色美食，並附上簡短原因（限100字以內，請以條列式並分段呈現）。`;
                            handleAIAction(aiBtnFood, prompt, "🍜 在地美食推薦：");
                        });
                    }
                    if (aiBtnTrip) {
                        aiBtnTrip.addEventListener('click', () => {
                            const prompt = `我現在在 ${city.country}(${city.countryEn}) 的 ${city.name}(${city.nameEn})，天氣是 ${weatherInfo.text}，氣溫 ${temp}°C。請用繁體中文為我規劃一個適合這個天氣的半日遊行程，包含景點與交通方式（限150字以內，請務必分段或條列說明，排版清晰易讀）。`;
                            handleAIAction(aiBtnTrip, prompt, "✨ 專屬半日遊行程：");
                        });
                    }

                } else {
                    throw new Error("找不到天氣資料");
                }
            } catch (error) {
                console.error("API Error:", error);
                weatherContent.innerHTML = `
                    <div class="text-center text-red-400 mt-4">
                        <i data-lucide="alert-circle" class="w-12 h-12 mx-auto mb-2"></i>
                <p>抱歉，無法取得 ${city.name} 的天氣資料。<br>請稍後再試。</p>
            </div>
        `;
        lucide.createIcons();
    }
}

        // --- 新增：取得使用者地理位置功能 ---
        const locateBtn = document.getElementById('locate-btn');
        locateBtn.addEventListener('click', () => {
            if ("geolocation" in navigator) {
                // 顯示載入中動畫
                const originalContent = locateBtn.innerHTML;
                locateBtn.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> <span class="hidden sm:inline">定位中...</span>`;
                lucide.createIcons();

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        // 恢復按鈕文字
                        locateBtn.innerHTML = originalContent;
                        lucide.createIcons();

                        // 建立一個代表使用者位置的專屬物件
                        const myLocation = {
                            name: "目前位置",
                            nameEn: "My Location",
                            lat: lat,
                            lng: lng,
                            country: "定位點",
                            countryEn: "Geolocated"
                        };

                        // 檢查是否已經點過定位，如果有就更新，沒有就加入城市陣列
                        const existingIndex = cities.findIndex(c => c.name === "目前位置");
                        if (existingIndex !== -1) {
                            cities[existingIndex] = myLocation;
                        } else {
                            cities.push(myLocation);
                        }

                        // 更新地球上的 HTML 標籤
                        world.htmlElementsData(cities);

                        // 強制套用目前的縮放比例，避免新標籤太大或太小
                        setTimeout(() => {
                            const currentAlt = world.pointOfView().altitude;
                            const dynamicScale = Math.max(0.8, Math.min(1.2, currentAlt * 0.4));
                            document.querySelectorAll('.city-marker-content').forEach(el => {
                                el.style.transform = `translate(-50%, -50%) scale(${dynamicScale})`;
                            });
                        }, 50);

                        // 模擬點擊這個新城市，轉動地球並呼叫天氣 API
                        handleCityClick(myLocation);
                    },
                    (error) => {
                        // GeolocationPositionError 物件在 console.log 中通常顯示為 {}，因此我們需要提取其 code 和 message 屬性
                        let errorMessage = "未知錯誤";
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = "使用者拒絕提供地理位置。";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = "無法取得位置資訊。";
                                break;
                            case error.TIMEOUT:
                                errorMessage = "請求使用者地理位置逾時。";
                                break;
                            case error.UNKNOWN_ERROR:
                                errorMessage = "發生不明錯誤。";
                                break;
                        }
                        console.error("定位錯誤:", errorMessage, error.message);
                        locateBtn.innerHTML = `<i data-lucide="navigation-off"></i> <span class="hidden sm:inline">定位失敗</span>`;
                        lucide.createIcons();
                        // 如果使用者拒絕授權或無法取得位置，顯示自訂的彈出視窗(避免使用瀏覽器內建 alert 影響體驗)
                        setTimeout(() => {
                            locateBtn.innerHTML = originalContent;
                            lucide.createIcons();
                            
                            weatherPanel.classList.remove('hidden');
                            weatherContent.innerHTML = `
                                <div class="text-center text-red-400 mt-4">
                                    <i data-lucide="alert-triangle" class="w-12 h-12 mx-auto mb-2"></i>
                                    <h3 class="text-xl font-bold mb-2">定位失敗</h3>
                                    <p class="text-sm text-gray-300 mb-4">${errorMessage}<br>請確認您的裝置或瀏覽器已「允許」此網站存取位置資訊，並且您目前位於安全的 HTTPS 連線中 (或 localhost)。</p>
                                </div>
                            `;
                            lucide.createIcons();
                        }, 1000);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 } // 定位參數設定
                );
            } else {
                // 瀏覽器不支援時的處理
                weatherPanel.classList.remove('hidden');
                weatherContent.innerHTML = `<div class="text-center text-red-400 mt-4"><p>您的瀏覽器不支援地理定位功能。</p></div>`;
            }
        });

    </script>
</body>
</html>
